name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-wqy-microhei fonts-noto-cjk
          fc-cache -f
      - name: Install production dependencies
        run: pip install -e .[prod]
      - name: Frontend syntax
        run: |
          node --check frontend/app.js
          node --check frontend/charts.js
      - name: Compile Python
        run: python -m compileall data_analyst_agent backend evals scripts tests
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Evals
        run: python -m evals.run_evals
      - name: Production readiness
        run: python -m backend.production_check
      - name: Build sandbox image
        run: docker build -f docker/sandbox.Dockerfile -t data-analyst-agent-sandbox:release .
