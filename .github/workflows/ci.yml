name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f
      - name: Install
        run: pip install -e .[prod]
      - name: Frontend syntax
        run: node --check frontend/app.js
      - name: Compile
        run: python -m compileall data_analyst_agent backend evals scripts
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Evals
        run: python -m evals.run_evals
      - name: Production configuration check
        run: python -m backend.production_check
      - name: Build Python sandbox image
        run: docker build -f docker/sandbox.Dockerfile -t data-analyst-agent-sandbox:ci .
      - name: Verify sandbox image
        run: |
          docker tag data-analyst-agent-sandbox:ci data-analyst-agent-sandbox:latest
          DATA_ANALYST_AGENT_EXECUTOR_MODE=docker python -m backend.production_check
