services:
  data-analyst-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
