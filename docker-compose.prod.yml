services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_analyst_agent}
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-data_analyst_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sandbox-image:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    image: data-analyst-agent-sandbox:latest
    command: ["python", "-c", "print('sandbox image ready')"]

  api:
    build:
      context: .
      args:
        INSTALL_EXTRAS: prod
    command: ["python", "-m", "backend.fastapi_app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${DATA_ANALYST_AGENT_PORT:-8000}:8000"
    environment:
      DATA_ANALYST_AGENT_DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-data_analyst_agent}
      DATA_ANALYST_AGENT_REDIS_URL: redis://redis:6379/0
      DATA_ANALYST_AGENT_ENV: prod
      DATA_ANALYST_AGENT_EXECUTOR_MODE: docker
      DATA_ANALYST_AGENT_ALLOWED_DB_HOSTS: postgres,localhost,127.0.0.1
      DATA_ANALYST_AGENT_API_TOKEN: ${DATA_ANALYST_AGENT_API_TOKEN:?set DATA_ANALYST_AGENT_API_TOKEN in .env.prod}
      DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET: ${DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET:?set DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET in .env.prod}
      DATA_ANALYST_AGENT_ADMIN_ACTORS: ${DATA_ANALYST_AGENT_ADMIN_ACTORS:-admin}
    volumes:
      - ./storage:/app/storage
      - ./uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      args:
        INSTALL_EXTRAS: prod
    command: ["python", "-m", "backend.worker"]
    environment:
      DATA_ANALYST_AGENT_DATABASE_URL: postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-data_analyst_agent}
      DATA_ANALYST_AGENT_REDIS_URL: redis://redis:6379/0
      DATA_ANALYST_AGENT_ENV: prod
      DATA_ANALYST_AGENT_EXECUTOR_MODE: docker
      DATA_ANALYST_AGENT_ALLOWED_DB_HOSTS: postgres,localhost,127.0.0.1
      DATA_ANALYST_AGENT_API_TOKEN: ${DATA_ANALYST_AGENT_API_TOKEN:?set DATA_ANALYST_AGENT_API_TOKEN in .env.prod}
      DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET: ${DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET:?set DATA_ANALYST_AGENT_PREFLIGHT_SIGNING_SECRET in .env.prod}
      DATA_ANALYST_AGENT_ADMIN_ACTORS: ${DATA_ANALYST_AGENT_ADMIN_ACTORS:-admin}
      DATA_ANALYST_AGENT_SANDBOX_VOLUME: data-analyst-agent-sandbox-work
      DATA_ANALYST_AGENT_SANDBOX_WORKDIR: /sandbox-work
    volumes:
      - ./storage:/app/storage
      - ./uploads:/app/backend/uploads
      - sandbox-work:/sandbox-work
      # Only the worker receives Docker access because it executes sandboxed Python jobs.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox-image:
        condition: service_completed_successfully

volumes:
  postgres-data:
  sandbox-work:
    name: data-analyst-agent-sandbox-work
